<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Personal Expense Tracker</h1>

        <div class="form-container">

            <div class="input-group">
                <label for="title">Title</label>
                <input type="text" id="title">
                <small class="error-message" id="titleError"></small>
            </div>

            <div class="input-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount">
                <small class="error-message" id="amountError"></small>
            </div>

            <div class="input-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="">Select Category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
                <small class="error-message" id="categoryError"></small>
            </div>

            <button id="addExpenseButton">Add Expense</button>

        </div>
<!-- bonous Task -->
 <!-- filter category -->
        <div class="filter-section">
            <label for="filterCategory">Filter Category</label>
            <select id="filterCategory">
                <option value="All">All</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <!-- Bonus Task: Sort Controls -->

        <div class="sort-section">

            <button id="sortAscendingButton">
                Sort Amount ↑
            </button>

            <button id="sortDescendingButton">
                Sort Amount ↓
            </button>

        </div>

        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody id="expenseTableBody">
            </tbody>
        </table>

        <div class="total-section">
            Total Expenses:
            <span id="totalAmount">PKR 0</span>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
